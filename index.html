<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MCPulse — Server Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ec; --surface: #ffffff; --border: #d6d0c4;
      --text: #1a1714; --text2: #6b6560;
      --green: #16a34a; --red: #dc2626; --radius: 12px;
    }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 22px 40px 18px; display: flex; align-items: baseline; gap: 14px; border-bottom: 1.5px solid var(--border); background: var(--surface); }
    .logo { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.03em; }
    .logo span { color: #22c55e; }
    .tagline { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--text2); }
    main { max-width: 1200px; margin: 0 auto; padding: 36px 24px 100px; }
    #server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
    .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; position: relative; transition: transform .2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.1); }
    .stat-val { font-family: 'Space Mono', monospace; font-weight: 700; }
    .mini-chart-wrap { height: 60px; margin-top: 10px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; padding: 30px; border-radius: 16px; width: 90%; max-width: 700px; }
    .modal-chart-wrap { height: 300px; }
    footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px; border-top: 1.5px solid var(--border); display: flex; justify-content: flex-end; }
    #add-form { display: none; gap: 10px; margin-right: 20px; }
  </style>
</head>
<body>

<header>
  <div class="logo">MC<span>Pulse</span></div>
  <div class="tagline">// server monitor</div>
</header>

<main>
  <div id="server-grid">Loading servers...</div>
</main>

<div class="modal-overlay" id="modal" onclick="if(event.target==this) closeModal()">
  <div class="modal">
    <h2 id="modal-name"></h2>
    <div class="modal-chart-wrap"><canvas id="modal-chart"></canvas></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<footer>
  <div id="add-form">
    <input id="new-name" placeholder="Name">
    <input id="new-host" placeholder="IP Address">
    <input id="admin-pass" type="password" placeholder="Password">
    <button onclick="addServer()">Add</button>
  </div>
  <button onclick="toggleForm()">+ Add Server</button>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDbONJHUIvQwVSas7Q0oS12aDq11DL4uTA",
    authDomain: "mcpulse-5ef8d.firebaseapp.com",
    databaseURL: "https://mcpulse-5ef8d-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mcpulse-5ef8d",
    storageBucket: "mcpulse-5ef8d.firebasestorage.app",
    messagingSenderId: "879593413677",
    appId: "1:879593413677:web:13a73a18ca065a01786ca4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  let servers = {};
  let modalChart = null;

  // 1. LOAD SERVERS AND START LISTENING
  onValue(ref(db, "servers"), snap => {
    const data = snap.val() || {};
    const grid = document.getElementById("server-grid");
    grid.innerHTML = "";
    
    for (const id in data) {
      if (!servers[id]) {
        servers[id] = { ...data[id], history: [] };
        setupHistoryListener(id);
      }
      renderCard(id);
    }
  });

  // 2. LISTEN FOR DATA (This updates your charts automatically)
  function setupHistoryListener(id) {
    onValue(ref(db, `history/${id}`), snap => {
      const pts = [];
      snap.forEach(child => { pts.push(child.val()); });
      pts.sort((a,b) => a.t - b.t);
      servers[id].history = pts;
      updateChart(id);
    });
  }

  // 3. THE "TIME GUARD" POLL FUNCTION
  async function pollAll() {
    const now = Date.now();
    const futureLimit = now + 30000; // Block anything more than 30s in the future

    for (const id in servers) {
      try {
        const r = await fetch(`https://api.mcsrvstat.us/2/${servers[id].host}`);
        const d = await r.json();
        const timestamp = Date.now();

        // ONLY SAVE IF TIME IS CORRECT
        if (timestamp < futureLimit) {
          push(ref(db, `history/${id}`), {
            t: timestamp,
            players: d.players?.online || 0,
            online: d.online
          });
        } else {
          console.error("PC Clock is in the future! Data blocked.");
        }
      } catch (e) { console.error("Ping failed", e); }
    }
  }

  // 4. SMART LABELS (Fixes the 9:49 PM issue)
  function getLabels(history) {
    return history.map(p => {
      const d = new Date(p.t);
      // If data is very new, show seconds to differentiate points
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    });
  }

  function renderCard(id) {
    const grid = document.getElementById("server-grid");
    const div = document.createElement("div");
    div.className = "card";
    div.onclick = () => openModal(id);
    div.innerHTML = `<h3>${servers[id].name}</h3><div class="mini-chart-wrap"><canvas id="chart-${id}"></canvas></div>`;
    grid.appendChild(div);
  }

  function updateChart(id) {
    const ctx = document.getElementById(`chart-${id}`);
    if (!ctx) return;
    const history = servers[id].history.slice(-20);
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: getLabels(history),
        datasets: [{ data: history.map(p => p.players), borderColor: '#22c55e', fill: true }]
      },
      options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
  }

  window.openModal = function(id) {
    document.getElementById("modal").classList.add("open");
    document.getElementById("modal-name").innerText = servers[id].name;
    const ctx = document.getElementById("modal-chart");
    const history = servers[id].history.slice(-50);
    if (modalChart) modalChart.destroy();
    modalChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: getLabels(history),
        datasets: [{ label: 'Players', data: history.map(p => p.players), borderColor: '#22c55e' }]
      }
    });
  };

  window.closeModal = () => document.getElementById("modal").classList.remove("open");
  window.toggleForm = () => {
    const f = document.getElementById("add-form");
    f.style.display = f.style.display === "flex" ? "none" : "flex";
  };

  setInterval(pollAll, 30000);
</script>
</body>
</html>
