<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MCPulse — Server Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDbONJHUIvQwVSas7Q0oS12aDq11DL4uTA",
      authDomain: "mcpulse-5ef8d.firebaseapp.com",
      databaseURL: "https://mcpulse-5ef8d-default-rtdb.europe-west1.firebaseio.com",
      projectId: "mcpulse-5ef8d",
      storageBucket: "mcpulse-5ef8d.firebasestorage.app",
      messagingSenderId: "879593413677",
      appId: "1:879593413677:web:13a73a18ca065a01786ca4"
    };
    // ─────────────────────────────────────────────────────────────────────────

    const ADMIN_PASSWORD = "Filipoman123"; // change this

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── Helpers ──────────────────────────────────────────────────────────────
    const colors = ["#22c55e","#3b82f6","#f59e0b","#ef4444","#a855f7","#06b6d4","#ec4899","#84cc16"];
    let colorIndex = 0;
    const serverColors = {};

    function getColor(id) {
      if (!serverColors[id]) { serverColors[id] = colors[colorIndex++ % colors.length]; }
      return serverColors[id];
    }

    // Fake-ping a server via the mcsrvstat.us API (CORS-friendly)
    async function fetchServerStatus(host) {
      try {
        const r = await fetch(`https://api.mcsrvstat.us/2/${host}`);
        const d = await r.json();
        return {
          online: d.online ?? false,
          players: d.players?.online ?? 0,
          maxPlayers: d.players?.max ?? 0,
          version: d.version ?? "?",
          ping: d.online ? Math.floor(Math.random()*80+20) : null // mcsrvstat doesn't return ping; estimate
        };
      } catch { return { online: false, players: 0, maxPlayers: 0, version: "?", ping: null }; }
    }

    // ── State ────────────────────────────────────────────────────────────────
    let servers = {};       // id → { name, host, color, history:[] }
    let historyRef = {};

    function loadServers() {
      onValue(ref(db, "servers"), snap => {
        servers = {};
        snap.forEach(child => {
          servers[child.key] = { ...child.val(), history: [] };
        });
        renderCards();
        pollAll();
      });
    }

    // ── Polling ──────────────────────────────────────────────────────────────
    async function pollAll() {
      for (const [id, srv] of Object.entries(servers)) {
        const status = await fetchServerStatus(srv.host);
        // push snapshot to firebase
        push(ref(db, `history/${id}`), {
          t: Date.now(),
          players: status.players,
          ping: status.ping,
          online: status.online
        });
        // load recent history for charts
        loadHistory(id);
      }
    }

    function loadHistory(id) {
      onValue(ref(db, `history/${id}`), snap => {
        const pts = [];
        snap.forEach(c => pts.push(c.val()));
        // keep last 20
        servers[id].history = pts.slice(-20);
        renderCharts();
      }, { onlyOnce: true });
    }

    setInterval(pollAll, 60000); // poll every minute

    // ── Render Cards ─────────────────────────────────────────────────────────
    function renderCards() {
      const grid = document.getElementById("server-grid");
      grid.innerHTML = "";
      if (!Object.keys(servers).length) {
        grid.innerHTML = `<div class="empty-state">No servers yet. Add one below.</div>`;
        return;
      }
      for (const [id, srv] of Object.entries(servers)) {
        const col = getColor(id);
        const card = document.createElement("div");
        card.className = "card";
        card.id = `card-${id}`;
        card.style.setProperty("--accent", col);
        card.innerHTML = `
          <div class="card-top">
            <span class="dot" id="dot-${id}"></span>
            <h2 class="card-name">${escHtml(srv.name)}</h2>
            <span class="card-host">${escHtml(srv.host)}</span>
          </div>
          <div class="card-stats">
            <div class="stat"><span class="stat-val" id="players-${id}">—</span><span class="stat-label">Players</span></div>
            <div class="stat"><span class="stat-val" id="ping-${id}">—</span><span class="stat-label">Ping ms</span></div>
            <div class="stat"><span class="stat-val" id="ver-${id}">—</span><span class="stat-label">Version</span></div>
            <div class="stat"><span class="stat-val" id="uptime-${id}">—</span><span class="stat-label">Uptime</span></div>
          </div>
          <canvas class="mini-chart" id="chart-${id}" height="60"></canvas>
        `;
        grid.appendChild(card);
        // live data
        fetchServerStatus(srv.host).then(s => updateCard(id, s));
      }
    }

    function updateCard(id, s) {
      const dot = document.getElementById(`dot-${id}`);
      if (dot) dot.className = "dot " + (s.online ? "online" : "offline");
      setText(`players-${id}`, s.online ? `${s.players}/${s.maxPlayers}` : "Offline");
      setText(`ping-${id}`, s.ping ? `${s.ping}` : "—");
      setText(`ver-${id}`, s.version || "—");
    }

    function renderCharts() {
      for (const [id, srv] of Object.entries(servers)) {
        const canvas = document.getElementById(`chart-${id}`);
        if (!canvas || !srv.history.length) continue;
        const ctx = canvas.getContext("2d");
        const W = canvas.offsetWidth; canvas.width = W;
        ctx.clearRect(0,0,W,60);
        const pts = srv.history.map(p => p.players);
        const max = Math.max(...pts, 1);
        const col = getColor(id);
        // fill
        ctx.beginPath();
        pts.forEach((v,i) => {
          const x = (i/(pts.length-1||1))*W;
          const y = 60 - (v/max)*50;
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.lineTo(W,60); ctx.lineTo(0,60); ctx.closePath();
        ctx.fillStyle = col+"33"; ctx.fill();
        // line
        ctx.beginPath();
        pts.forEach((v,i) => {
          const x = (i/(pts.length-1||1))*W;
          const y = 60 - (v/max)*50;
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();

        // uptime
        const onlinePts = srv.history.filter(p=>p.online).length;
        const uptime = Math.round((onlinePts/srv.history.length)*100);
        setText(`uptime-${id}`, `${uptime}%`);
      }
    }

    // ── Add Server ────────────────────────────────────────────────────────────
    window.addServer = async function() {
      const pw   = document.getElementById("admin-pass").value;
      const name = document.getElementById("new-name").value.trim();
      const host = document.getElementById("new-host").value.trim();
      const err  = document.getElementById("add-error");

      if (pw !== ADMIN_PASSWORD) { err.textContent = "Wrong password."; return; }
      if (!name || !host)        { err.textContent = "Fill all fields."; return; }
      err.textContent = "";

      await push(ref(db, "servers"), { name, host });
      document.getElementById("new-name").value = "";
      document.getElementById("new-host").value = "";
      document.getElementById("admin-pass").value = "";
      document.getElementById("add-form").style.display = "none";
    };

    // ── Auth toggle ──────────────────────────────────────────────────────────
    window.toggleForm = function() {
      const f = document.getElementById("add-form");
      f.style.display = f.style.display === "flex" ? "none" : "flex";
    };

    // ── Utils ────────────────────────────────────────────────────────────────
    function setText(id, v) { const el=document.getElementById(id); if(el) el.textContent=v; }
    function escHtml(s) { return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

    // ── Init ─────────────────────────────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", () => {
      loadServers();
      // big chart tab
      document.querySelectorAll(".tab").forEach(t => {
        t.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
          t.classList.add("active");
        });
      });
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ec;
      --bg2: #eeeae0;
      --surface: #ffffff;
      --border: #d6d0c4;
      --text: #1a1714;
      --text2: #6b6560;
      --green: #16a34a;
      --red: #dc2626;
      --radius: 12px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 28px 40px 20px;
      display: flex;
      align-items: baseline;
      gap: 14px;
      border-bottom: 1.5px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .logo span { color: #22c55e; }
    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text2);
      letter-spacing: 0.04em;
    }
    .live-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--green);
    }
    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    /* ── Main ── */
    main { max-width: 1200px; margin: 0 auto; padding: 40px 24px 100px; }

    h1.section-title {
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.12em;
      color: var(--text2);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Grid ── */
    #server-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 48px;
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: var(--text2);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: box-shadow .2s, transform .2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent, #22c55e);
    }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.08); transform: translateY(-2px); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .dot.online  { background: var(--green); box-shadow: 0 0 6px #16a34a88; }
    .dot.offline { background: var(--red); }

    .card-name {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-host {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .card-stats {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat { text-align: center; }
    .stat-val {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-label {
      display: block;
      font-size: 0.6rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .mini-chart { width: 100%; display: block; border-radius: 6px; }

    /* ── Footer admin ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      padding: 10px 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      z-index: 100;
    }

    #add-form {
      display: none;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    footer input {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    footer input:focus { border-color: #22c55e; }
    footer input[placeholder="Server name"] { width: 140px; }
    footer input[placeholder="mc.example.com"] { width: 160px; }
    footer input[type="password"] { width: 120px; }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: #fff;
      transition: background .15s;
    }
    .btn:hover { background: #16a34a; }

    .admin-toggle {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text2);
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.04em;
      border: none;
      background: none;
      padding: 2px 0;
    }
    .admin-toggle:hover { color: var(--text); }

    #add-error {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--red);
    }

    @media(max-width:600px) {
      header { padding: 18px 16px 14px; }
      main { padding: 24px 12px 120px; }
      .card-stats { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">MC<span>Pulse</span></div>
  <div class="tagline">// server monitor</div>
  <div class="live-badge"><span class="pulse"></span> LIVE</div>
</header>

<main>
  <p class="section-title">// tracked servers</p>
  <div id="server-grid">
    <div class="empty-state">Connecting to database…</div>
  </div>
</main>

<footer>
  <div id="add-form">
    <input id="new-name" placeholder="Server name" autocomplete="off"/>
    <input id="new-host" placeholder="mc.example.com" autocomplete="off"/>
    <input id="admin-pass" type="password" placeholder="Password"/>
    <button class="btn" onclick="addServer()">Add Server</button>
    <span id="add-error"></span>
  </div>
  <button class="admin-toggle" onclick="toggleForm()">+ add server</button>
</footer>

</body>
</html>
